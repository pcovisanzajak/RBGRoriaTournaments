<html lang="en">

    <style>
        :root {
    --red: #e3350d; --red-dk: #b02a0a; --yellow: #f7c948;

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    font-family: 'Nunito', sans-serif;

}

  /* ══════════════════ NAV ══════════════════ */

    box-shadow: 0 2px 8px rgba(0,0,0,0.25);

  /* hamburger — left */
  .hamburger {
    width: 40px; height: 40px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center; gap: 5px;
    cursor: pointer;
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.3);

    transition: background .2s;
    flex-shrink: 0;
  }
  .hamburger:hover { background: rgba(255,255,255,0.2); }
  .hamburger span {
    display: block;
    width: 18px; height: 2px;
    background: #fff;
    border-radius: 2px;
    transition: transform .3s, opacity .3s;
    transform-origin: center;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* logo — centre */

<script>
    const SUPABASE_URL = 'https://lvtmmtvxozabealfxqmy.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_tJbIaorQ_wp3Qt5_Vxwwgw_x7dcGc7-';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const params = new URLSearchParams(window.location.search);
    const tournamentId = params.get('id');

    async function init() {
        const { data: t } = await sb.from('tournaments').select('*').eq('id', tournamentId).single();
        if (!t) return document.body.innerHTML = "Tournament not found.";

        document.getElementById('t-name').textContent = t.name;
        document.getElementById('t-desc').textContent = t.description || "No description provided.";
        document.getElementById('t-status').textContent = `STATUS: ${t.status.toUpperCase()}`;
        
        const regZone = document.getElementById('registration-zone');
        if (t.status === 'registration') {
            regZone.innerHTML = `<button class="btn-poke" onclick="join()">Request to Join</button>`;
        } else {
            regZone.innerHTML = `<p>Registration is currently closed for this tournament.</p>`;
        }
    }

    async function join() {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) return alert("Please log in first!");

        const { error } = await sb.from('tournament_participants').insert({
            tournament_id: tournamentId,
            profile_id: session.user.id
        });

        if (error) alert("You are already registered or an error occurred.");
        else alert("Success! Your participation request has been sent.");
    }

    init();



let currentUser = null;
let profile = null;

window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await fetchProfile(session.user);
  
  sb.auth.onAuthStateChange(async (event, session) => {
    if (session) await fetchProfile(session.user);
    else { window.location.href = 'index.html'; }
  });
});

async function fetchProfile(user) {
  currentUser = user;
  const { data, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (data) {
    profile = data;
    updateUI();
    renderNav();
  }
}

function updateUI() {
  if (!profile) return;
  document.getElementById('prof-username').textContent = profile.username;
  document.getElementById('prof-roria-name').textContent = '@' + (profile.roria_username || 'trainer');
  document.getElementById('prof-bio-text').textContent = profile.bio || "No bio set.";
  document.getElementById('rec-wins').textContent = profile.wins || 0;
  document.getElementById('rec-losses').textContent = profile.losses || 0;
  document.getElementById('rec-draws').textContent = profile.draws || 0;
  document.getElementById('rec-total').textContent = (profile.wins || 0) + (profile.losses || 0) + (profile.draws || 0);
  updateAvatarDisplay(profile.avatar_url);
}

function renderNav() {
  const nr = document.getElementById('navRight');
  const ds = document.getElementById('drawerUserSection');
  if (!profile) return;

  const init = profile.username[0].toUpperCase();
  const avHtml = (profile.avatar_url && profile.avatar_url.includes('http')) 
    ? `<img src="${profile.avatar_url}" style="width:28px; height:28px; border-radius:50%; object-fit:cover;">`
    : `<div class="av" style="width:28px; height:28px; border-radius:50%; background:var(--yellow); display:flex; align-items:center; justify-content:center; color:var(--red-dk); font-size:12px;">${init}</div>`;

  if (nr) nr.innerHTML = `<div class="user-chip">${avHtml}<span>${profile.username}</span></div>`;
  if (ds) ds.innerHTML = `<div style="font-weight:800; margin-bottom:10px;">${profile.username}</div><button class="btn-poke" style="font-size:10px; padding:8px;" onclick="handleLogout()">Log Out</button>`;
}

async function handleLogout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

function updateAvatarDisplay(url) {
  const imgEl = document.getElementById('prof-av-img');
  const letterEl = document.getElementById('prof-av-letter');
  const container = document.getElementById('prof-av');

  if (url && url.includes('http')) {
    imgEl.src = url;
    imgEl.style.display = 'block';
    letterEl.style.display = 'none';
    container.style.background = 'transparent'; // Remove background color if showing image
  } else {
    imgEl.style.display = 'none';
    letterEl.style.display = 'flex';
    container.style.background = 'var(--red)';
    if(profile) letterEl.textContent = (profile.username || 'T')[0].toUpperCase();
  }
}

async function uploadIcon(input) {
  if (!input.files || input.files.length === 0) return;
  
  const file = input.files[0];
  // Check file size (optional safety: 2MB limit)
  if (file.size > 2 * 1024 * 1024) return toast("❌ File too large (Max 2MB)");

  toast("⏳ Uploading...");
  
  // We use a clean name. Using just 'avatar' with upsert replaces the old one, 
  // keeping your storage bucket from filling up with old images.
  const fileExt = file.name.split('.').pop();
  const fileName = `${currentUser.id}/avatar.${fileExt}`;

  // 1. Upload to Storage
  const { error: uploadError } = await sb.storage
    .from('avatars')
    .upload(fileName, file, { 
      upsert: true // This is crucial: it allows you to update the existing file
    });

  if (uploadError) {
    console.error("Upload error:", uploadError);
    return toast("❌ Upload failed");
  }

  // 2. Get the Public URL
  const { data: urlData } = sb.storage.from('avatars').getPublicUrl(fileName);
  const publicUrl = `${urlData.publicUrl}?t=${Date.now()}`; // Cache-busting query string

  // 3. Update the Profile Table
  const { error: updateError } = await sb
    .from('profiles')
    .update({ avatar_url: publicUrl })
    .eq('id', currentUser.id);

  if (updateError) {
    console.error("Profile update error:", updateError);
    return toast("❌ Table update failed");
  }

  // 4. Update Local State and UI
  profile.avatar_url = publicUrl;
  updateUI(); 
  renderNav();
  toast("✅ Icon Updated!");
}

async function updateAccount() {
  const newName = document.getElementById('update-user').value.trim();
  if (!newName) return toast("Enter a name!");
  const { error } = await sb.from('profiles').update({ username: newName }).eq('id', currentUser.id);
  if (!error) { profile.username = newName; updateUI(); renderNav(); toast("✨ Name Updated!"); }
}

async function toggleBioEdit() {
  const textEl = document.getElementById('prof-bio-text');
  const inputEl = document.getElementById('prof-bio-input');
  const btn = document.getElementById('edit-bio-btn');
  if (inputEl.style.display === 'none') {
    inputEl.value = profile.bio || "";
    textEl.style.display = 'none'; inputEl.style.display = 'block'; btn.textContent = "Save Bio";
  } else {
    const newBio = inputEl.value.trim();
    await sb.from('profiles').update({ bio: newBio }).eq('id', currentUser.id);
    profile.bio = newBio; textEl.textContent = newBio || "No bio set.";
    textEl.style.display = 'block'; inputEl.style.display = 'none'; btn.textContent = "Edit Bio";
    toast("✨ Bio Updated!");
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

/* ─── INIT ─── */
window.addEventListener('DOMContentLoaded', async () => {
  /* restore session */
  const { data: { session } } = await sb.auth.getSession();
  if (session) await loadProfile(session.user);

  /* listen for auth changes */
  sb.auth.onAuthStateChange(async (event, session) => {
    if (session) { await loadProfile(session.user); }
    else { currentUser = null; profile = null; renderNav(); }
  });

  // Call these two to fill the page data
  loadStats();
  loadLeaderboard(); 
});

/* ─── PROFILE ─── */
async function loadProfile(user) {
  currentUser = user;
  const { data, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (error) console.error("Profile Fetch Error:", error);
  profile = data;
  renderNav();
}

/* ─── NAV render ─── */
function renderNav() {
  const nr = document.getElementById('navRight');
  const ds = document.getElementById('drawerUserSection');
  if (!profile || !nr) return;

  const init = (profile.username || 'T')[0].toUpperCase();
  
  // Create the avatar HTML for the nav bar
  const avHtml = (profile.avatar_url && profile.avatar_url.includes('http')) 
    ? `<img src="${profile.avatar_url}" style="width:28px; height:28px; border-radius:50%; object-fit:cover; border: 2px solid #fff;">`
    : `<div class="av">${init}</div>`;

  // Update Top Nav
  nr.innerHTML = `
    <div class="user-chip" onclick="window.location.href='account.html'">
      ${avHtml}
      <span class="uname">${profile.username}</span>
    </div>`;

  // Update Sidebar Drawer
  if (ds) {
    ds.innerHTML = `
      <div class="drawer-user-section">
        <div class="drawer-user-row">
          ${avHtml.replace('28px','38px').replace('28px','38px')} 
          <div>
            <div class="drawer-uname">${profile.username}</div>
            <div class="drawer-suname">@${profile.roria_username || 'trainer'}</div>
          </div>
        </div>
        <button class="drawer-logout" onclick="handleLogout()">Log Out</button>
      </div>`;
  }
}
/* ─── SIGN UP ─── */
async function handleSignup() {
  clearErrors('su');
  const username  = v('su-user');
  const roria     = v('su-roria');
  const email     = v('su-email');
  const pass      = v('su-pass');
  const confirm   = v('su-confirm');

  if (!username || !roria || pass.length < 8 || pass !== confirm) {
    if (!username) setErr('sf-user');
    if (!roria) setErr('sf-roria');
    if (pass.length < 8) setErr('sf-pass');
    if (pass !== confirm) setErr('sf-confirm');
    return;
  }

  setBtnLoading('su-btn', true);

  // Create a pseudo-email if none provided
  const authEmail = email || `${username.toLowerCase().replace(/\s+/g,'_')}@rbg.roria.local`;

  const { data, error } = await sb.auth.signUp({
    email: authEmail,
    password: pass,
    options: { data: { username, roria_username: roria } }
  });

  if (error) {
    console.error("Signup Auth Error:", error);
    showStatus('su-status', 'err', error.message);
    setBtnLoading('su-btn', false);
    return;
  }

  if (data.user) {
    const { error: profileError } = await sb.from('profiles').upsert({
      id: data.user.id,
      username: username,
      roria_username: roria,
      auth_email: authEmail
    });

    if (profileError) {
      console.error("Profile Creation Error:", profileError);
      showStatus('su-status', 'err', "Account made, but profile failed. Please try logging in.");
    } else {
      await loadProfile(data.user);
      closeModal('signup');
      toast('🎮 Welcome, ' + username + '!');
    }
  }
  setBtnLoading('su-btn', false);
}

/* ─── LOG IN ─── */
async function handleLogin() {
  clearErrors('li');
  const username = v('li-user');
  const pass     = v('li-pass');

  if (!username || !pass) {
    if (!username) setErr('lf-user');
    if (!pass) setErr('lf-pass');
    return;
  }

  setBtnLoading('li-btn', true);

  // 1. Find the email used for this username
  const { data: prof, error: fetchError } = await sb
    .from('profiles')
    .select('auth_email')
    .eq('username', username)
    .single();

  if (fetchError || !prof) {
    showStatus('li-status', 'err', 'Trainer not found.');
    setBtnLoading('li-btn', false);
    return;
  }

  // 2. Sign in with that email
  const { error: loginError } = await sb.auth.signInWithPassword({
    email: prof.auth_email,
    password: pass,
  });

  if (loginError) {
    showStatus('li-status', 'err', 'Incorrect password.');
    setBtnLoading('li-btn', false);
    return;
  }

  setBtnLoading('li-btn', false);
  closeModal('login');
  toast('⚡ Logged in!');
}

/* ─── LOG OUT ─── */
async function handleLogout() {
  await sb.auth.signOut();
  closeDrawer();
  toast('👋 Logged out');
  location.reload(); // Refresh to clear private data
}
</script>
