    color: var(--text);
    min-height: 100vh;

  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
    z-index: 0;
  }

  /* ══════ NAV ══════ */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--red);
    border-bottom: 4px solid var(--red-dk);
    display: flex; align-items: center;
    padding: 0 20px; gap: 16px;
    z-index: 200;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .hamburger {
    width: 40px; height: 40px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center; gap: 5px;
    cursor: pointer; border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.3);

  }
  .hamburger:hover { background: rgba(255,255,255,0.2); }
  .hamburger span {
    display: block; width: 18px; height: 2px;
    background: #fff; border-radius: 2px;
    transition: transform .3s, opacity .3s; transform-origin: center;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  .nav-logo {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    line-height: 1; pointer-events: none; user-select: none;
  }
  .nav-logo .top-line {
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    color: var(--yellow); letter-spacing: 3px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }
  .nav-logo .bottom-line {
    font-family: 'Press Start 2P', monospace; font-size: 13px;
    color: #fff; letter-spacing: 1px;

  }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  /* ══════ DRAWER ══════ */

  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .drawer {
    position: fixed; top: 0; left: 0;
    width: 280px; height: 100%;
    background: #fff; border-right: 4px solid var(--border);
    z-index: 400; transform: translateX(-100%);
    transition: transform .32s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    box-shadow: 4px 0 24px rgba(0,0,0,0.15);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-header {

    padding: 18px 20px;
    display: flex; flex-direction: column; align-items: flex-start;
  }
  .drawer-header .site-tag {
    font-family: 'Press Start 2P', monospace; font-size: 7px;
    color: var(--yellow); letter-spacing: 2px; margin-bottom: 4px;

  /* Meta bar */
  .article-meta-bar {
    background: var(--card);
    border: 3px solid var(--border);

    box-shadow: var(--shadow);
    margin-bottom: 28px;

    font-size: clamp(13px, 2.5vw, 18px);
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 24px;
    opacity: 0; animation: fadeUp .4s .2s forwards;

  .article-body {
    background: var(--card);
    border: 3px solid var(--border);

  /* ══════════════════════════════════════════
     TAG CLASS HELPER
  ══════════════════════════════════════════ */
  function tagClass(cat) {
    return {
      announcement: 'news-tag-announcement',
      tournament:   'news-tag-tournament',
      update:       'news-tag-update',
      community:    'news-tag-community',
    }[cat] || 'news-tag-announcement';
  }

  /* ══════════════════════════════════════════
     LOAD ARTICLE
  ══════════════════════════════════════════ */
  function loadArticle() {
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const article = ARTICLES.find(a => a.id === id);
    const container = document.getElementById('pageContent');

    if (!article) {
      container.innerHTML = `
        <div class="article-container">
          <div class="not-found">
            <div class="nf-icon">😕</div>
            <h2>Article Not Found</h2>
            <p>That article doesn't exist or may have been removed.</p>
            <br><br>
            <a class="back-btn" href="news.html">← Back to News</a>
          </div>
        </div>`;
      return;
    }

    // Update page title
    document.title = article.title + ' – RBG Roria Tournaments';

    container.innerHTML = `
      <div class="article-hero" style="background: ${article.heroBg};">
        ${article.emoji}
      </div>

      <div class="article-container">
        <div class="article-meta-bar">
          <span class="news-tag ${tagClass(article.category)}">${article.categoryLabel}</span>
          <span class="article-date">📅 ${article.date}</span>
        </div>

        <h1 class="article-title">${article.title}</h1>

        <div class="article-body">
          ${article.body}
        </div>

        <a class="back-btn" href="news.html">← Back to News</a>
      </div>
    `;
  }

  loadArticle();

  /* ══════ DRAWER ══════ */
  function toggleDrawer() {
    const open = document.getElementById('drawer').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open', open);
    document.getElementById('hamburger').classList.toggle('open', open);
  }
  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('hamburger').classList.remove('open');
  }
</script>
</body>
