<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News – RBG Roria Tournaments</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --red:     #e3350d;
    --red-dk:  #b02a0a;
    --yellow:  #f7c948;
    --blue:    #2c6fad;
    --blue-lt: #4a90d9;
    --white:   #f8f8f8;
    --off:     #ece8df;
    --card:    #ffffff;
    --border:  #c8c0b0;
    --text:    #2a2a2a;
    --muted:   #7a7265;
    --green:   #4caf50;
    --nav-h:   60px;
    --shadow:  0 4px 0 rgba(0,0,0,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--off);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
    z-index: 0;
  }

  /* ══════════════════ NAV ══════════════════ */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--red);
    border-bottom: 4px solid var(--red-dk);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    z-index: 200;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .hamburger {
    width: 40px; height: 40px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center; gap: 5px;
    cursor: pointer;
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    transition: background .2s;
    flex-shrink: 0;
  }
  .hamburger:hover { background: rgba(255,255,255,0.2); }
  .hamburger span {
    display: block;
    width: 18px; height: 2px;
    background: #fff;
    border-radius: 2px;
    transition: transform .3s, opacity .3s;
    transform-origin: center;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .nav-logo {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    line-height: 1;
    pointer-events: auto;
    cursor: pointer;
    user-select: none;
  }
  .nav-logo .top-line {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--yellow);
    letter-spacing: 3px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }
  .nav-logo .bottom-line {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: #fff;
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  }

  .nav-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 14px 5px 7px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    cursor: pointer;
    transition: background .2s;
  }
  .user-chip:hover { background: rgba(255,255,255,0.25); }
  .user-chip .av {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--yellow);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: var(--red-dk);
    border: 2px solid #fff;
    font-family: 'Nunito', sans-serif;
  }
  .user-chip .uname { color: #fff; font-weight: 800; font-size: 13px; }

  /* ══════════════════ OVERLAY + DRAWER ══════════════════ */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 300;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .drawer {
    position: fixed;
    top: 0; left: 0;
    width: 280px; height: 100%;
    background: #fff;
    border-right: 4px solid var(--border);
    z-index: 400;
    transform: translateX(-100%);
    transition: transform .32s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    box-shadow: 4px 0 24px rgba(0,0,0,0.15);
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    background: var(--red);
    border-bottom: 4px solid var(--red-dk);
    padding: 18px 20px;
    display: flex; flex-direction: column; align-items: flex-start;
  }
  .drawer-header .site-tag {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--yellow);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .drawer-header .site-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: #fff;
    line-height: 1.6;
  }

  .drawer-section {
    padding: 14px 20px 6px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .drawer-item {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 20px;
    cursor: pointer;
    border-left: 4px solid transparent;
    transition: all .15s;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
  }
  .drawer-item:hover, .drawer-item.active {
    background: var(--off);
    border-left-color: var(--red);
    color: var(--red);
  }
  .drawer-item .di-icon { font-size: 20px; width: 26px; text-align: center; }

  .drawer-divider { height: 1px; background: var(--border); margin: 8px 20px; }

  .drawer-user-section {
    padding: 16px 20px;
    background: var(--off);
    border-top: 1px solid var(--border);
    margin-top: auto;
  }
  .drawer-user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .drawer-av {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--red);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; color: #fff;
    border: 3px solid var(--red-dk);
  }
  .drawer-uname { font-weight: 800; font-size: 15px; color: var(--text);}
  .drawer-suname { font-size: 12px; color: var(--muted); }
  .drawer-logout {
    width: 100%; padding: 9px; border-radius: 8px; background: transparent; 
    border: 2px solid var(--border); font-family: 'Nunito', sans-serif; 
    font-weight: 800; font-size: 13px; color: var(--muted); cursor: pointer; transition: all .2s; 
  }
  .drawer-logout:hover { border-color: var(--red); color: var(--red); }

  /* ══════════════════ PAGE HEADER ══════════════════ */
  .page-header {
    padding-top: calc(var(--nav-h) + 40px);
    padding-bottom: 40px;
    padding-left: 24px; padding-right: 24px;
    text-align: center;
    position: relative; z-index: 1;
  }

  .page-eyebrow {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--red);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp .5s .1s forwards;
  }

  .page-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(16px, 3.5vw, 28px);
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeUp .5s .25s forwards;
  }

  .page-sub {
    font-size: 16px; font-weight: 600;
    color: var(--muted);
    max-width: 480px; margin: 0 auto;
    line-height: 1.6;
    opacity: 0;
    animation: fadeUp .5s .4s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ══════════════════ NEWS GRID ══════════════════ */
  .page { position: relative; z-index: 1; flex: 1; }
  .container { max-width: 960px; margin: 0 auto; padding: 0 20px 64px; }

  .news-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    opacity: 0;
    animation: fadeUp .5s .5s forwards;
  }

  /* Featured Article (spans full width) */
  .news-featured {
    background: var(--card);
    border: 3px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    position: relative;
  }
  .news-featured::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 5px;
    background: var(--red);
  }

  .news-featured-img {
    background: linear-gradient(135deg, var(--red) 0%, var(--red-dk) 100%);
    min-height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 100px;
    position: relative;
    overflow: hidden;
  }
  .news-featured-img::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 70%, rgba(247,201,72,0.15), transparent 70%);
  }

  .news-featured-body {
    padding: 36px;
    display: flex; flex-direction: column; justify-content: center;
    gap: 16px;
  }

  .news-meta {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }

  .news-tag {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 11px; font-weight: 800;
    letter-spacing: .5px;
    border: 2px solid transparent;
  }
  .news-tag-announcement { background: #ffe5e5; border-color: #f4a0a0; color: var(--red); text-transform: uppercase; }

  .news-date {
    font-size: 12px; font-weight: 700;
    color: var(--muted);
  }

  .news-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }

  .news-excerpt {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    flex: 1;
  }
  
  .news-excerpt p {
    margin-bottom: 16px;
    color: var(--muted);
    font-weight: 600;
  }

  .rules-list {
    list-style: none;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--off);
    padding: 20px;
    border-radius: 12px;
    border: 2px solid var(--border);
  }

  .rules-list li {
    font-weight: 700;
    font-size: 13px;
    display: flex;
    gap: 10px;
  }

  .tag-allowed { color: var(--green); font-weight: 900; }
  .tag-banned { color: var(--red); font-weight: 900; }
  .tag-theme { color: var(--blue); font-weight: 900; }

  .news-read-more {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 14px 24px;
    background: var(--yellow);
    border: 2px solid #d4a017;
    border-radius: 10px;
    color: var(--text);
    font-weight: 800;
    font-size: 13px;
    text-decoration: none;
    box-shadow: 0 4px 0 #d4a017;
    transition: all 0.1s;
    margin-top: 10px;
    width: max-content;
    text-transform: uppercase;
  }
  .news-read-more:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 #d4a017;
  }

  .empty-state { text-align: center; padding: 40px; color: var(--muted); font-weight: 800; font-size: 14px; }

  /* ══════════════════ FOOTER ══════════════════ */
  footer {
    background: var(--text);
    color: rgba(255,255,255,0.5);
    text-align: center;
    padding: 24px;
    font-size: 11px;
    font-family: 'Press Start 2P', monospace;
    letter-spacing: 1px;
    position: relative; z-index: 1;
    margin-top: auto;
  }
  footer span { color: var(--red); }

  /* ══════════════════ RESPONSIVE ══════════════════ */
  @media (max-width: 800px) {
    .news-featured { grid-template-columns: 1fr; }
    .news-featured-img { min-height: 180px; font-size: 80px; }
    .news-featured-body { padding: 24px; }
  }

</style>
</head>
<body>

<nav>
  <div class="hamburger" id="hamburger" onclick="toggleDrawer()">
    <span></span><span></span><span></span>
  </div>
  <div class="nav-logo" onclick="window.location.href='index.html'">
    <span class="top-line">RBG</span>
    <span class="bottom-line">RORIA TOURNAMENTS</span>
  </div>
  <div class="nav-right" id="navRight"></div>
</nav>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="site-tag">RBG</div>
    <div class="site-name">RORIA<br>TOURNAMENTS</div>
  </div>

  <div class="drawer-section">Menu</div>
  <a class="drawer-item" href="index.html" onclick="closeDrawer()"><span class="di-icon">🏠</span> Home</a>
  <a class="drawer-item" href="index.html#leaderboard" onclick="closeDrawer()"><span class="di-icon">🏆</span> Leaderboard</a>
  <a class="drawer-item" href="index.html#tournaments" onclick="closeDrawer()"><span class="di-icon">⚡</span> Tournaments</a>

  <div class="drawer-divider"></div>

  <div class="drawer-section">Info</div>
  <a class="drawer-item active" href="news.html" onclick="closeDrawer()"><span class="di-icon">📰</span> News</a>
  <a class="drawer-item" href="about.html" onclick="closeDrawer()"><span class="di-icon">👥</span> About Us</a>

  <div id="drawerUserSection"></div>
</div>

<div class="page-header">
  <p class="page-eyebrow">// Latest Updates</p>
  <h1 class="page-title">📰 News</h1>
  <p class="page-sub">Tournament announcements, rule updates, and community highlights.</p>
</div>

<div class="page">
  <div class="container">
    <div class="news-grid" id="newsGrid">
        <div class="empty-state">Loading latest news...</div>
    </div>
  </div>
</div>

<footer>
  <span>RBG</span> RORIA TOURNAMENTS &nbsp;·&nbsp; © 2026 &nbsp;·&nbsp; ALL RIGHTS RESERVED
</footer>

<script>
  // SUPABASE SETUP
  const SUPABASE_URL  = 'https://lvtmmtvxozabealfxqmy.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_tJbIaorQ_wp3Qt5_Vxwwgw_x7dcGc7-';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  let currentUser = null;
  let profile     = null;

  // INITIALIZATION
  window.addEventListener('DOMContentLoaded', async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) await loadProfile(session.user);
    else renderNav();

    sb.auth.onAuthStateChange(async (event, session) => {
        if (session) await loadProfile(session.user);
        else { currentUser = null; profile = null; renderNav(); }
    });

    await loadNews();
  });

  // PROFILE & NAV LOGIC
  async function loadProfile(user) {
    currentUser = user;
    const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
    profile = data;
    renderNav();
  }

  function renderNav() {
    const nr = document.getElementById('navRight');
    const ds = document.getElementById('drawerUserSection');
    
    if (!profile) {
        if (nr) nr.innerHTML = ``; // Hide log in buttons if you don't want them on news page, or add them back if desired
        if (ds) ds.innerHTML = '';
        return;
    }

    const initLetter = profile.username[0].toUpperCase();
    const avHtml = (profile.avatar_url && profile.avatar_url.includes('http'))
        ? `<img src="${profile.avatar_url}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid #fff;">`
        : `<div class="av">${initLetter}</div>`;

    if (nr) nr.innerHTML = `<div class="user-chip" onclick="window.location.href='account.html'">${avHtml}<span class="uname">${profile.username}</span></div>`;

    if (ds) {
        const drawerAv = (profile.avatar_url && profile.avatar_url.includes('http')) 
            ? `<img src="${profile.avatar_url}" style="width:38px; height:38px; border-radius:50%; object-fit:cover; border: 3px solid var(--red-dk);">`
            : `<div class="drawer-av">${initLetter}</div>`;

        ds.innerHTML = `
            <div class="drawer-user-section">
                <div class="drawer-user-row">
                    ${drawerAv}
                    <div>
                        <div class="drawer-uname">${profile.username}</div>
                        <div class="drawer-suname">@${profile.roria_username || 'trainer'}</div>
                    </div>
                </div>
                <button class="drawer-logout" onclick="handleLogout()">Log Out</button>
            </div>`;
    }
  }

  async function handleLogout() {
    await sb.auth.signOut();
    closeDrawer();
    setTimeout(() => location.reload(), 1000);
  }

  // DRAWER LOGIC
  function toggleDrawer() {
    const open = document.getElementById('drawer').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open', open);
    document.getElementById('hamburger').classList.toggle('open', open);
  }
  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('hamburger').classList.remove('open');
  }

  // FETCH AND RENDER NEWS FROM SUPABASE
  async function loadNews() {
      const grid = document.getElementById('newsGrid');
      
      const { data: articles, error } = await sb.from('news_articles').select('*').order('created_at', { ascending: false });

      if (error) {
          grid.innerHTML = `<div class="empty-state" style="color:var(--red);">Error loading news. Check console.</div>`;
          console.error("News fetch error:", error);
          return;
      }

      if (!articles || articles.length === 0) {
          grid.innerHTML = `<div class="empty-state">No news articles posted yet!</div>`;
          return;
      }

      // Generate HTML for all articles pulled from Supabase
      grid.innerHTML = articles.map(article => `
        <div class="news-featured">
          <div class="news-featured-img">🌪️</div>
          <div class="news-featured-body">
            <div class="news-meta">
              <span class="news-tag news-tag-announcement">${article.category || 'Announcement'}</span>
              <span class="news-date">${new Date(article.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
            </div>
            <h2 class="news-title">${article.title}</h2>
            <div class="news-excerpt">${article.excerpt}</div>
            <a class="news-read-more" href="index.html">Register Now →</a>
          </div>
        </div>
      `).join('');
  }
</script>
</body>
</html>
