<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password – RBG Roria Tournaments</title>
<link rel="icon" type="image/svg+xml" href="Gemini_Generated_Image_9l05hr9l05hr9l05__1_-removebg-preview.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --red: #e3350d; --red-dk: #b02a0a; --yellow: #f7c948;
    --off: #ece8df; --border: #c8c0b0; --text: #2a2a2a; --muted: #7a7265;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--off); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px); background-size: 20px 20px; pointer-events: none; z-index: 0; }
  
  .reset-box { background: #fff; border: 4px solid var(--border); border-radius: 18px; padding: 32px 28px; width: 100%; max-width: 420px; position: relative; box-shadow: 0 8px 0 rgba(0,0,0,0.12); z-index: 1; }
  .reset-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: var(--red); border-radius: 14px 14px 0 0; }
  
  .title { font-family: 'Press Start 2P', monospace; font-size: 16px; margin-bottom: 8px; color: var(--text); text-align: center; line-height: 1.5; }
  .sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; font-weight: 600; text-align: center; }
  
  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field input { width: 100%; background: var(--off); border: 2px solid var(--border); border-radius: 10px; padding: 11px 14px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; outline: none; transition: 0.2s; }
  .field input:focus { border-color: var(--red); background: #fff; }
  
  .btn-poke { width: 100%; padding: 13px; border-radius: 10px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; cursor: pointer; border: 3px solid var(--red-dk); background: var(--red); color: #fff; box-shadow: 0 4px 0 var(--red-dk); text-transform: uppercase; margin-top: 10px; transition: 0.1s;}
  .btn-poke:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--red-dk); }
  
  .status-msg { padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 700; margin-bottom: 12px; display: none; text-align: center; }
  .status-msg.err { background: #ffe5e5; color: var(--red); border: 2px solid #f4a0a0; display: block; }
  .status-msg.ok  { background: #e6f9e6; color: #2a7a2a; border: 2px solid #80c880; display: block; }
</style>
</head>
<body>

<div class="reset-box">
  <div class="title">Secure Reset</div>
  <div class="sub">Enter your new trainer password.</div>
  
  <div class="status-msg" id="rp-status"></div>

  <div class="field">
    <label>New Password</label>
    <input type="password" id="rp-pass" placeholder="Min. 8 characters">
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="rp-conf" placeholder="Repeat password">
  </div>

  <button class="btn-poke" id="rp-btn" onclick="submitNewPassword()">Save Password</button>
</div>

<script>
const SUPABASE_URL  = 'https://lvtmmtvxozabealfxqmy.supabase.co';
const SUPABASE_ANON = 'sb_publishable_tJbIaorQ_wp3Qt5_Vxwwgw_x7dcGc7-';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

async function submitNewPassword() {
  const p1 = document.getElementById('rp-pass').value;
  const p2 = document.getElementById('rp-conf').value;
  const statusEl = document.getElementById('rp-status');
  const btn = document.getElementById('rp-btn');

  if (p1.length < 8) {
    statusEl.className = 'status-msg err';
    statusEl.textContent = 'Password must be at least 8 characters.';
    return;
  }
  if (p1 !== p2) {
    statusEl.className = 'status-msg err';
    statusEl.textContent = 'Passwords do not match.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Saving...';

  // Supabase automatically handles the secure token from the URL
  const { error } = await sb.auth.updateUser({ password: p1 });

  if (error) {
    statusEl.className = 'status-msg err';
    statusEl.textContent = error.message;
    btn.disabled = false;
    btn.textContent = 'Save Password';
  } else {
    statusEl.className = 'status-msg ok';
    statusEl.textContent = 'Success! Redirecting to home...';
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 2000);
  }
}
</script>
</body>
</html>
