<style>

  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--off); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* ══════════════════ NAV ══════════════════ */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--red);
    border-bottom: 4px solid var(--red-dk);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    z-index: 200;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .hamburger {
    width: 40px; height: 40px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center; gap: 5px;
    cursor: pointer;
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    transition: background .2s;
    flex-shrink: 0;
  }
  .hamburger:hover { background: rgba(255,255,255,0.2); }
  .hamburger span {
    display: block; width: 18px; height: 2px; background: #fff;
    border-radius: 2px; transition: transform .3s, opacity .3s; transform-origin: center;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .nav-logo {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    line-height: 1; cursor: pointer; user-select: none;
  }
  .nav-logo .top-line { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--yellow); letter-spacing: 3px; text-shadow: 1px 1px 0 rgba(0,0,0,0.3); }
  .nav-logo .bottom-line { font-family: 'Press Start 2P', monospace; font-size: 13px; color: #fff; letter-spacing: 1px; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }

  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  .user-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 14px 5px 7px; background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3); border-radius: 20px;
    cursor: pointer; transition: background .2s;
  }
  .user-chip:hover { background: rgba(255,255,255,0.25); }
  .user-chip .av {
    width: 28px; height: 28px; border-radius: 50%; background: var(--yellow);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: var(--red-dk); border: 2px solid #fff;
  }
  .user-chip .uname { color: #fff; font-weight: 800; font-size: 13px; }

  /* ══════════════════ DRAWER ══════════════════ */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; opacity: 0; pointer-events: none; transition: 0.3s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .drawer { position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: #fff; border-right: 4px solid var(--border); z-index: 400; transform: translateX(-100%); transition: 0.3s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; }
  .drawer.open { transform: translateX(0); }
  .drawer-header { background: var(--red); border-bottom: 4px solid var(--red-dk); padding: 18px 20px; display: flex; flex-direction: column; align-items: flex-start; }
  .drawer-header .site-tag { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--yellow); letter-spacing: 2px; margin-bottom: 4px; }
  .drawer-header .site-name { font-family: 'Press Start 2P', monospace; font-size: 11px; color: #fff; line-height: 1.6; }

  .drawer-item { display: flex; align-items: center; gap: 14px; padding: 15px 20px; cursor: pointer; font-weight: 700; color: var(--text); text-decoration: none; border-bottom: 1px solid var(--off); transition: all 0.2s; }

  .drawer-av { width: 38px; height: 38px; border-radius: 50%; background: var(--red); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #fff; border: 3px solid var(--red-dk); }
  .drawer-uname { font-weight: 800; font-size: 15px; }
  .drawer-suname { font-size: 12px; color: var(--muted); }
  .drawer-logout { width: 100%; padding: 9px; border-radius: 8px; background: transparent; border: 2px solid var(--border); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px; color: var(--muted); cursor: pointer; transition: all .2s; }
  .drawer-logout:hover { border-color: var(--red); color: var(--red); }

  /* ══════════════════ LAYOUT ══════════════════ */
  .hero { padding-top: calc(var(--nav-h) + 40px); display: flex; justify-content: center; padding-bottom: 60px; }
  .profile-layout { display: grid; grid-template-columns: 320px 1fr; gap: 30px; width: 100%; max-width: 1100px; padding: 0 20px; align-items: start; }

  .profile-av img { width: 100%; height: 100%; object-fit: cover; display: none; }

  .prof-user { font-family: 'Press Start 2P', monospace; font-size: 16px; margin-bottom: 5px; text-align: center; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 24px; }

  .stat-val { font-family: 'Press Start 2P', monospace; font-size: 18px; display: block; }
  .stat-label { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; }

  .field { margin-bottom: 15px; text-align: left; }
  .field label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
  .field input, .field textarea { width: 100%; background: var(--off); border: 2px solid var(--border); border-radius: 10px; padding: 10px; font-weight: 700; font-family: inherit; outline: none; transition: 0.2s; }
  .field input:focus, .field textarea:focus { border-color: var(--red); background: #fff; }
  
  .btn-poke { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; background: var(--red); color: #fff; box-shadow: 0 4px 0 var(--red-dk); transition: 0.1s; font-family: 'Nunito', sans-serif;}
  .btn-poke:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--red-dk); }
  .btn-ghost { background: transparent; color: var(--text); border: 2px solid var(--border); box-shadow: none; margin-top: 10px; }
  .btn-ghost:hover { border-color: var(--red); color: var(--red); }

  /* Tournament History Table */
  .history-section { margin-top: 30px; }
  .sec-head { margin-bottom: 22px; }
  .sec-eyebrow { font-family: 'Press Start 2P', monospace; font-size: 8px; letter-spacing: 3px; color: var(--red); text-transform: uppercase; margin-bottom: 8px; display: block; }
  .sec-title { font-family: 'Press Start 2P', monospace; font-size: clamp(14px, 2.5vw, 20px); color: var(--text); line-height: 1.5; }
  
  .lb-card { background: var(--card); border: 3px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
  .lb-card table { width: 100%; border-collapse: collapse; }
  .lb-card th { padding: 12px 18px; text-align: left; font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); background: var(--off); border-bottom: 2px solid var(--border); }
  .lb-card td { padding: 14px 18px; border-bottom: 1px solid var(--off); font-size: 14px; font-weight: 700; }
  .lb-card tr:last-child td { border-bottom: none; }
  .lb-card tr:hover td { background: #fffaf5; }
  
  .tag { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; letter-spacing: .5px; }
  .tag-live { background: #ffe5e5; border: 2px solid #f4a0a0; color: var(--red); }
  .tag-past { background: var(--off); border: 2px solid var(--border); color: var(--muted); }
  .tag-upcoming { background: #fff8e0; border: 2px solid #f0d060; color: #a07800; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2a2a2a; color: #fff; padding: 12px 24px; border-radius: 30px; opacity: 0; transition: 0.3s; z-index: 999; pointer-events: none; font-weight: 800; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

  @media (max-width: 900px) { .profile-layout { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: 1fr 1fr; } }
</style>

<script>
/* ══════════════════════════════════════════
   SUPABASE CONFIG & INITIALIZATION
══════════════════════════════════════════ */
const SUPABASE_URL  = 'https://lvtmmtvxozabealfxqmy.supabase.co';
const SUPABASE_ANON = 'sb_publishable_tJbIaorQ_wp3Qt5_Vxwwgw_x7dcGc7-';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser = null;
let profile = null;

window.addEventListener('DOMContentLoaded', async () => {
  // Check auth session
  const { data: { session } } = await sb.auth.getSession();
  
  if (!session) {
    // If not logged in, boot them back to the homepage
    window.location.href = 'index.html';
    return;
  }

  // Load user data
  await loadProfile(session.user);

  // Listen for auth state changes
  sb.auth.onAuthStateChange(async (event, session) => {
    if (session) { 
      await loadProfile(session.user); 
    } else { 
      window.location.href = 'index.html'; 
    }
  });
});

/* ══════════════════════════════════════════
   DATA LOADING
══════════════════════════════════════════ */
async function loadProfile(user) {
  currentUser = user;
  
  // Fetch Profile DB Data
  const { data, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (error) {
    console.error("Profile Fetch Error:", error);
    toast("❌ Error loading profile");
    return;
  }
  
  profile = data;
  
  // Update the UI
  updateUI();
  renderNav();
  loadHistory(user.id);
}

function updateUI() {
  if (!profile) return;
  
  // Text fields
  document.getElementById('prof-username').textContent = profile.username;
  document.getElementById('prof-roria-name').textContent = '@' + (profile.roria_username || 'trainer');
  document.getElementById('prof-bio-text').textContent = profile.bio || "No bio set. Tell the world about your team!";
  
  // Inputs
  document.getElementById('update-user').value = profile.username;
  
  // Stats
  document.getElementById('rec-wins').textContent = profile.wins || 0;
  document.getElementById('rec-losses').textContent = profile.losses || 0;
  document.getElementById('rec-draws').textContent = profile.draws || 0;
  document.getElementById('rec-total').textContent = (profile.wins || 0) + (profile.losses || 0) + (profile.draws || 0);
  
  // Avatar
  updateAvatarDisplay(profile.avatar_url, profile.username);
}

function updateAvatarDisplay(url, username) {
  const imgEl = document.getElementById('prof-av-img');
  const letterEl = document.getElementById('prof-av-letter');
  
  if (url && url.includes('http')) {
    imgEl.src = url;
    imgEl.style.display = 'block';
    letterEl.style.display = 'none';
  } else {
    imgEl.style.display = 'none';
    letterEl.style.display = 'flex';
    letterEl.textContent = (username || 'T')[0].toUpperCase();
  }
}

async function loadHistory(userId) {
  // Fetch tournaments the user is registered in
  const { data, error } = await sb
    .from('tournament_participants')
    .select(`
      id,
      tournaments ( id, name, start_date, status )
    `)
    .eq('profile_id', userId)
    .order('created_at', { ascending: false });

  const tbody = document.getElementById('tournament-history-body');
  
  if (error || !data || data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color: var(--muted); padding: 40px;">No tournament data found. Join an event!</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(row => {
    const t = row.tournaments;
    if (!t) return '';
    
    const date = t.start_date ? new Date(t.start_date).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) : 'TBD';
    let statusClass = 'tag-upcoming';
    let statusText = t.status.toUpperCase();
    
    if (t.status === 'live' || t.status === 'group_stage' || t.status === 'qualifications') statusClass = 'tag-live';
    else if (t.status === 'ended') statusClass = 'tag-past';
    
    return `
      <tr>
        <td><a href="tournament.html?id=${t.id}" style="color:var(--red); font-weight:800; text-decoration:none;">${t.name}</a></td>
        <td>${date}</td>
        <td><span class="tag ${statusClass}">${statusText}</span></td>
      </tr>`;
  }).join('');
}

/* ══════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════ */
function renderNav() {
  const nr = document.getElementById('navRight');
  const ds = document.getElementById('drawerUserSection');
  if (!profile || !nr) return;

  const init = profile.username[0].toUpperCase();
  const avHtml = (profile.avatar_url && profile.avatar_url.includes('http')) 
    ? `<img src="${profile.avatar_url}" style="width:28px; height:28px; border-radius:50%; object-fit:cover; border:2px solid #fff;">`
    : `<div class="av">${init}</div>`;

  // Top Nav
  nr.innerHTML = `<div class="user-chip">${avHtml}<span class="uname">${profile.username}</span></div>`;  
  // Drawer
  if (ds) {
    const drawerAv = (profile.avatar_url && profile.avatar_url.includes('http')) 
      ? `<img src="${profile.avatar_url}" style="width:38px; height:38px; border-radius:50%; object-fit:cover; border: 3px solid var(--red-dk);">`
      : `<div class="drawer-av">${init}</div>`;
      
    ds.innerHTML = `
      <div class="drawer-user-section">
        <div class="drawer-user-row">
          ${drawerAv}
          <div>
            <div class="drawer-uname">${profile.username}</div>
            <div class="drawer-suname">@${profile.roria_username || 'trainer'}</div>
          </div>
        </div>
        <button class="drawer-logout" onclick="handleLogout()">Log Out</button>
      </div>`;
  }
}

async function handleLogout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

/* ══════════════════════════════════════════
   UPDATING ACCOUNT
══════════════════════════════════════════ */
async function updateAccount() {
  const newName = document.getElementById('update-user').value.trim();
  const newPass = document.getElementById('update-pass').value;

  if (!newName) return toast("⚠️ Display name cannot be empty!");

  let successMsg = "✨ Changes saved!";

  // 1. Update Display Name in Database
  if (newName !== profile.username) {
    const { error } = await sb.from('profiles').update({ username: newName }).eq('id', currentUser.id);
    if (error) return toast("❌ Failed to update name");
    profile.username = newName;
  }

  // 2. Update Password if provided
  if (newPass) {
    if (newPass.length < 8) return toast("⚠️ Password must be at least 8 characters");
    const { error } = await sb.auth.updateUser({ password: newPass });
    if (error) return toast("❌ Failed to update password");
    document.getElementById('update-pass').value = ''; // clear field
    successMsg = "🔐 Password updated!";
  }

  updateUI();
  renderNav();
  toast(successMsg);
}

async function toggleBioEdit() {
  const textEl = document.getElementById('prof-bio-text');
  const inputEl = document.getElementById('prof-bio-input');
  const btn = document.getElementById('edit-bio-btn');
  
  if (inputEl.style.display === 'none') {
    // Switch to edit mode
    inputEl.value = profile.bio || "";
    textEl.style.display = 'none'; 
    inputEl.style.display = 'block'; 
    btn.textContent = "Save Bio";
    btn.classList.remove('btn-ghost');
  } else {
    // Save changes
    const newBio = inputEl.value.trim();
    const { error } = await sb.from('profiles').update({ bio: newBio }).eq('id', currentUser.id);
    
    if (error) {
      toast("❌ Failed to update bio");
    } else {
      profile.bio = newBio; 
      textEl.textContent = newBio || "No bio set. Tell the world about your team!";
      textEl.style.display = 'block'; 
      inputEl.style.display = 'none'; 
      btn.textContent = "Edit Bio";
      btn.classList.add('btn-ghost');
      toast("✨ Bio Updated!");
    }
  }
}

async function uploadIcon(input) {
  if (!input.files || input.files.length === 0) return;
  
  const file = input.files[0];
  if (file.size > 2 * 1024 * 1024) return toast("❌ File too large (Max 2MB)");

  toast("⏳ Uploading...");
  
  const fileExt = file.name.split('.').pop();
  const fileName = `${currentUser.id}/avatar.${fileExt}`;

  // 1. Upload to Supabase Storage
  const { error: uploadError } = await sb.storage
    .from('avatars')
    .upload(fileName, file, { upsert: true });

  if (uploadError) {
    console.error("Upload error:", uploadError);
    return toast("❌ Upload failed");
  }

  // 2. Get Public URL
  const { data: urlData } = sb.storage.from('avatars').getPublicUrl(fileName);
  const publicUrl = `${urlData.publicUrl}?t=${Date.now()}`; // Bypass cache

  // 3. Save URL to Profile DB
  const { error: updateError } = await sb
    .from('profiles')
    .update({ avatar_url: publicUrl })
    .eq('id', currentUser.id);

  if (updateError) {
    console.error("Profile update error:", updateError);
    return toast("❌ Database update failed");
  }

  // 4. Update UI
  profile.avatar_url = publicUrl;
  updateUI(); 
  renderNav();
  toast("✅ Icon Updated!");
}

/* ─── TOAST ─── */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; 
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
