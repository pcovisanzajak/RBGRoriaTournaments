<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News – RBG Roria Tournaments</title>
<link rel="icon" type="image/svg+xml" href="Gemini_Generated_Image_9l05hr9l05hr9l05__1_-removebg-preview.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --red:     #e3350d;
    --red-dk:  #b02a0a;
    --yellow:  #f7c948;
    --blue:    #2c6fad;
    --off:     #ece8df;
    --card:    #ffffff;
    --border:  #c8c0b0;
    --text:    #2a2a2a;
    --muted:   #7a7265;
    --green:   #4caf50;
    --nav-h:   60px;
    --shadow:  0 4px 0 rgba(0,0,0,0.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--off); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px); background-size: 20px 20px; pointer-events: none; z-index: 0; }

  /* ══════ NAV ══════ */
  nav { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); background: var(--red); border-bottom: 4px solid var(--red-dk); display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
  .hamburger { width: 40px; height: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; border-radius: 8px; border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); transition: background .2s; flex-shrink: 0; }
  .hamburger:hover { background: rgba(255,255,255,0.2); }
  .hamburger span { display: block; width: 18px; height: 2px; background: #fff; border-radius: 2px; transition: transform .3s, opacity .3s; transform-origin: center; }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  
  .nav-logo { position: absolute; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; line-height: 1; cursor: pointer; user-select: none; text-decoration: none; }
  .nav-logo .top-line { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--yellow); letter-spacing: 3px; text-shadow: 1px 1px 0 rgba(0,0,0,0.3); }
  .nav-logo .bottom-line { font-family: 'Press Start 2P', monospace; font-size: 13px; color: #fff; letter-spacing: 1px; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
  
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .nav-btn { padding: 7px 16px; border-radius: 20px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px; cursor: pointer; border: 2px solid transparent; transition: all .2s; white-space: nowrap; text-decoration: none; }
  .nav-btn-ghost { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); color: #fff; }
  .nav-btn-solid { background: var(--yellow); border-color: #d4a017; color: #2a2a2a; box-shadow: 0 3px 0 #d4a017; }
  
  .user-chip { display: flex; align-items: center; gap: 8px; padding: 5px 14px 5px 7px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 20px; cursor: pointer; transition: background .2s; }
  .user-chip .av { width: 28px; height: 28px; border-radius: 50%; background: var(--yellow); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: var(--red-dk); border: 2px solid #fff; font-family: 'Nunito', sans-serif; }
  .user-chip .uname { color: #fff; font-weight: 800; font-size: 13px; }

  /* ══════ DRAWER ══════ */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; opacity: 0; pointer-events: none; transition: opacity .3s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .drawer { position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: #fff; border-right: 4px solid var(--border); z-index: 400; transform: translateX(-100%); transition: transform .32s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; box-shadow: 4px 0 24px rgba(0,0,0,0.15); }
  .drawer.open { transform: translateX(0); }
  .drawer-header { background: var(--red); border-bottom: 4px solid var(--red-dk); padding: 18px 20px; display: flex; flex-direction: column; align-items: flex-start; }
  .drawer-header .site-tag { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--yellow); letter-spacing: 2px; margin-bottom: 4px; }
  .drawer-header .site-name { font-family: 'Press Start 2P', monospace; font-size: 11px; color: #fff; line-height: 1.6; }
  .drawer-section { padding: 14px 20px 6px; font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .drawer-item { display: flex; align-items: center; gap: 14px; padding: 13px 20px; cursor: pointer; border-left: 4px solid transparent; transition: all .15s; font-size: 15px; font-weight: 700; color: var(--text); text-decoration: none; }
  .drawer-item:hover, .drawer-item.active { background: var(--off); border-left-color: var(--red); color: var(--red); }
  .drawer-item .di-icon { font-size: 20px; width: 26px; text-align: center; }
  .drawer-divider { height: 1px; background: var(--border); margin: 8px 20px; }
  
  .drawer-user-section { padding: 16px 20px; background: var(--off); border-top: 1px solid var(--border); margin-top: auto; }
  .drawer-user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .drawer-av { width: 38px; height: 38px; border-radius: 50%; background: var(--red); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #fff; border: 3px solid var(--red-dk); }
  .drawer-uname { font-weight: 800; font-size: 15px; color: var(--text); }
  .drawer-suname { font-size: 12px; color: var(--muted); }
  .drawer-logout { width: 100%; padding: 9px; border-radius: 8px; background: transparent; border: 2px solid var(--border); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px; color: var(--muted); cursor: pointer; transition: all .2s; }
  .drawer-logout:hover { border-color: var(--red); color: var(--red); }

  /* ══════ NEWS LAYOUT ══════ */
  .page-header { padding: calc(var(--nav-h) + 40px) 24px 20px; text-align: center; position: relative; z-index: 1; }
  .page-title { font-family: 'Press Start 2P', monospace; font-size: 26px; margin-bottom: 10px; }

  .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; position: relative; z-index: 1; }
  .filter-btn { padding: 10px 16px; border-radius: 10px; border: 2px solid var(--border); background: #fff; font-family: 'Press Start 2P', monospace; font-size: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 3px 0 var(--border); }
  .filter-btn.active { background: var(--red); color: #fff; border-color: var(--red-dk); box-shadow: 0 3px 0 var(--red-dk); transform: translateY(2px); }

  .container { max-width: 880px; margin: 0 auto; padding: 0 20px 80px; position: relative; z-index: 1; flex: 1 0 auto; }
  .news-grid { display: grid; gap: 20px; }

  .news-card {
    background: var(--card); border: 3px solid var(--border); border-radius: 14px;
    display: grid; grid-template-columns: 120px 1fr; overflow: hidden; box-shadow: var(--shadow);
    transition: transform 0.2s;
  }
  .news-card:hover { transform: translateY(-4px); }
  
  .news-icon-box { background: linear-gradient(135deg, var(--red), var(--red-dk)); display: flex; align-items: center; justify-content: center; font-size: 50px; }
  .news-body { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .news-meta { display: flex; align-items: center; gap: 10px; }
  
  .news-tag { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; border: 2px solid transparent; }
  .news-tag-announcement { background: #ffe5e5; border-color: #f4a0a0; color: var(--red); }
  .news-tag-tournament   { background: #fff8e0; border-color: #f0d060; color: #a07800; }
  .news-tag-update       { background: #e0eeff; border-color: #90b8f0; color: var(--blue); }
  .news-tag-community    { background: #e0ffe5; border-color: #80d090; color: #256030; }

  .news-date { font-size: 12px; font-weight: 700; color: var(--muted); }
  .news-card-title { font-family: 'Press Start 2P', monospace; font-size: 13px; line-height: 1.6; color: var(--text); }
  
  .read-more-btn {
    padding: 10px 18px; background: var(--yellow); border: 2px solid #d4a017;
    border-radius: 8px; font-weight: 800; font-size: 12px; text-decoration: none;
    color: var(--text); width: fit-content; text-transform: uppercase;
    box-shadow: 0 3px 0 #d4a017; margin-top: 5px; transition: 0.1s;
  }
  .read-more-btn:active { transform: translateY(2px); box-shadow: none; }

  /* ══════ IDENTICAL FOOTER FROM INDEX.HTML ══════ */
  footer {
    position: relative; z-index: 1;
    background: var(--text);
    color: rgba(255,255,255,0.5);
    text-align: center;
    padding: 28px 20px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    line-height: 2;
    margin-top: auto;
  }
  footer span { color: var(--yellow); }
</style>
</head>
<body>

<nav>
  <div class="hamburger" id="hamburger" onclick="toggleDrawer()">
    <span></span><span></span><span></span>
  </div>
  <a href="index.html" class="nav-logo">
    <span class="top-line">RBG</span>
    <span class="bottom-line">RORIA TOURNAMENTS</span>
  </a>
  <div class="nav-right" id="navRight"></div>
</nav>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="site-tag">RBG</div>
    <div class="site-name">RORIA<br>TOURNAMENTS</div>
  </div>
  <div class="drawer-section">Menu</div>
  <a class="drawer-item" href="index.html"><span class="di-icon">🏠</span> Home</a>
  <a class="drawer-item" href="index.html#leaderboard"><span class="di-icon">🏆</span> Leaderboard</a>
  <a class="drawer-item" href="index.html#live"><span class="di-icon">⚡</span> Tournaments</a>
  <div class="drawer-divider"></div>
  <div class="drawer-section">Info</div>
  <a class="drawer-item active" href="news.html"><span class="di-icon">📰</span> News</a>
  <a class="drawer-item" href="about.html"><span class="di-icon">👥</span> About Us</a>
  <div id="drawerUserSection"></div>
</div>

<div class="page-header">
  <h1 class="page-title">📰 News</h1>
  <p style="color: var(--muted); font-weight: 700;">Filter by category to find specific tournament updates.</p>
</div>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" onclick="filterNews('all', this)">All</button>
  <button class="filter-btn" onclick="filterNews('Announcement', this)">Announcements</button>
  <button class="filter-btn" onclick="filterNews('Tournament', this)">Tournaments</button>
  <button class="filter-btn" onclick="filterNews('Update', this)">Updates</button>
</div>

<div class="container">
  <div class="news-grid" id="newsGrid">
    <div style="text-align:center; padding: 40px; font-weight: 800; color: var(--muted);">Loading news...</div>
  </div>
</div>

<footer>
  <span>RBG</span> RORIA TOURNAMENTS &nbsp;·&nbsp; © 2026 &nbsp;·&nbsp; ALL RIGHTS RESERVED
</footer>

<script>
const SUPABASE_URL  = 'https://lvtmmtvxozabealfxqmy.supabase.co';
const SUPABASE_ANON = 'sb_publishable_tJbIaorQ_wp3Qt5_Vxwwgw_x7dcGc7-';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser = null;
let profile = null;

window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await loadProfile(session.user);
  else renderNav();

  sb.auth.onAuthStateChange(async (event, session) => {
    if (session) await loadProfile(session.user);
    else { currentUser = null; profile = null; renderNav(); }
  });

  loadNews();
});

async function loadProfile(user) {
  currentUser = user;
  const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
  profile = data;
  renderNav();
}

function renderNav() {
  const nr = document.getElementById('navRight');
  const ds = document.getElementById('drawerUserSection');
  
  if (!profile) {
    if (nr) nr.innerHTML = `<a href="index.html" class="nav-btn nav-btn-ghost">Log In</a> <a href="index.html" class="nav-btn nav-btn-solid">Sign Up</a>`;
    if (ds) ds.innerHTML = ''; 
    return;
  }

  const initLetter = profile.username[0].toUpperCase();
  const avHtml = (profile.avatar_url && profile.avatar_url.includes('http'))
    ? `<img src="${profile.avatar_url}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid #fff;">`
    : `<div class="av">${initLetter}</div>`;

  if (nr) nr.innerHTML = `<div class="user-chip" onclick="window.location.href='account.html'">${avHtml}<span class="uname">${profile.username}</span></div>`;

  if (ds) {
    const drawerAv = (profile.avatar_url && profile.avatar_url.includes('http')) 
      ? `<img src="${profile.avatar_url}" style="width:38px; height:38px; border-radius:50%; object-fit:cover; border: 3px solid var(--red-dk);">`
      : `<div class="drawer-av">${initLetter}</div>`;

    ds.innerHTML = `
      <div class="drawer-user-section">
        <div class="drawer-user-row">
          ${drawerAv}
          <div><div class="drawer-uname">${profile.username}</div><div class="drawer-suname">@${profile.roria_username || 'trainer'}</div></div>
        </div>
        <button class="drawer-logout" onclick="handleLogout()">Log Out</button>
      </div>`;
  }
}

async function handleLogout() {
  await sb.auth.signOut();
  closeDrawer();
  setTimeout(() => location.reload(), 1000);
}

function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); document.getElementById('hamburger').classList.toggle('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); document.getElementById('hamburger').classList.remove('open'); }

let allArticles = [];

function getCategoryClass(cat) {
    const lookup = {
        'Announcement': 'news-tag-announcement',
        'Tournament': 'news-tag-tournament',
        'Update': 'news-tag-update',
        'Community': 'news-tag-community'
    };
    return lookup[cat] || 'news-tag-announcement';
}

async function loadNews() {
    const { data: articles, error } = await sb.from('news_articles').select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    allArticles = articles;
    renderArticles(articles);
}

function renderArticles(list) {
    const grid = document.getElementById('newsGrid');
    if (list.length === 0) {
        grid.innerHTML = `<div style="text-align:center; padding: 40px; font-weight: 800; color: var(--muted);">No articles found in this category.</div>`;
        return;
    }
    grid.innerHTML = list.map(a => `
        <div class="news-card">
            <div class="news-icon-box">🌪️</div>
            <div class="news-body">
                <div class="news-meta">
                    <span class="news-tag ${getCategoryClass(a.category)}">${a.category || 'News'}</span>
                    <span class="news-date">📅 ${new Date(a.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
                </div>
                <h2 class="news-card-title">${a.title}</h2>
                <a class="read-more-btn" href="article.html?id=${a.id}">Read More →</a>
            </div>
        </div>
    `).join('');
}

function filterNews(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (cat === 'all') renderArticles(allArticles);
    else renderArticles(allArticles.filter(a => a.category === cat));
}
</script>
</body>
</html>
